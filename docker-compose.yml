name: recruitment-app
services:
  mongo:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - 27017:27017
    env_file:
      - .env
    volumes:
      - ./data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/mongo-init/init.js
 
  frontend-recruitment-app:
    build: .
    container_name: frontend-recruitment-app
    restart: always
    ports:
      - 3000:3000
    env_file:
      - .env
    depends_on:
      - mongo
