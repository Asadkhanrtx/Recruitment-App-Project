apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: asad-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: asad-ns
spec:
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitment-app
  namespace: asad-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recruitment-app
  template:
    metadata:
      labels:
        app: recruitment-app
    spec:
      containers:
      - name: recruitment-app
        image: asadoblivion/recruitment-app:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: recruitment-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: recruitment-app-service
  namespace: asad-ns
spec:
  type: NodePort
  selector:
    app: recruitment-app
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30007
